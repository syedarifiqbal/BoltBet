# OpenResty / Nginx configuration for BoltBet API Gateway
# OpenResty = Nginx + LuaJIT. Lua modules live in /etc/nginx/lua/.
# Run `make certs` once before first start to generate self-signed TLS certs.

worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # ── Lua ─────────────────────────────────────────────────────────────────────
    lua_package_path "/etc/nginx/lua/?.lua;;";

    # ── DNS resolver (Docker internal) ───────────────────────────────────────────
    # Defers hostname resolution to runtime so Nginx starts even when Phase 2
    # services (identity-service, betting-service, etc.) don't exist yet.
    resolver 127.0.0.11 valid=5s ipv6=off;

    # ── Logging ──────────────────────────────────────────────────────────────────
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"bytes_sent":$bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time",'
            '"upstream_addr":"$upstream_addr",'
            '"http_referer":"$http_referer",'
            '"http_user_agent":"$http_user_agent",'
            '"request_id":"$request_id_final"'
        '}';

    access_log /dev/stdout json_combined;

    # ── Request ID ───────────────────────────────────────────────────────────────
    # Prefer client-supplied X-Request-ID; generate one if absent.
    # Must be in http block — map is not valid inside server or location blocks.
    map $http_x_request_id $request_id_final {
        default   $http_x_request_id;
        ""        $request_id;
    }

    # ── CORS origin map ───────────────────────────────────────────────────────────
    map $http_origin $cors_origin {
        default                  "";
        "https://localhost:3000"  "https://localhost:3000";
        "http://localhost:3000"   "http://localhost:3000";
    }

    # ── Security ─────────────────────────────────────────────────────────────────
    server_tokens off;

    # Security headers — use more_set_headers (ngx_headers_more, bundled in OpenResty)
    # instead of add_header. Nginx's add_header has a critical inheritance flaw:
    # any add_header in a child block (server/location) silently drops ALL parent
    # add_header directives. more_set_headers is additive — it always applies
    # regardless of what add_header directives exist in child blocks.
    more_set_headers "Strict-Transport-Security: max-age=63072000; includeSubDomains; preload";
    more_set_headers "X-Frame-Options: DENY";
    more_set_headers "X-Content-Type-Options: nosniff";
    more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
    more_set_headers "Content-Security-Policy: default-src 'none'; script-src 'self'; connect-src 'self'; img-src 'self'; style-src 'self'; base-uri 'self'; form-action 'self'";
    more_set_headers "Permissions-Policy: camera=(), microphone=(), geolocation=()";
    # Hide exact server version (server_tokens off still shows "openresty")
    more_set_headers "Server: nginx";

    # ── Performance ──────────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65s;
    keepalive_requests 1000;

    # ── Compression ──────────────────────────────────────────────────────────────
    gzip on;
    gzip_types application/json;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;

    # ── Rate limiting zones ───────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=global_ip:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth_ip:10m  rate=5r/m;

    # ── Proxy defaults ────────────────────────────────────────────────────────────
    # NOTE: No static upstream{} blocks — all proxy_pass directives use
    # `set $upstream_* "host:port"` variables so that DNS resolution is deferred
    # to request time. This lets Nginx/OpenResty start even when Phase 2 services
    # (identity-service, betting-service, etc.) don't exist yet.
    # The resolver directive above (127.0.0.11) handles runtime lookups.
    proxy_http_version 1.1;
    proxy_set_header Connection "";          # required for upstream keepalive
    proxy_connect_timeout 5s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;
    proxy_buffering       on;
    proxy_buffer_size     8k;
    proxy_buffers         8 8k;

    # ── HTTP server (port 80) ─────────────────────────────────────────────────────
    server {
        listen 80;
        server_name localhost _;

        # Health check endpoint — no redirect so load balancers can reach it
        location = /health {
            access_log off;
            add_header Content-Type application/json always;
            return 200 '{"status":"ok","service":"gateway"}';
        }

        # Everything else → HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS server (port 443) ───────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name localhost _;

        # TLS
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        # Disable stapling — self-signed cert has no OCSP responder
        ssl_stapling        off;
        ssl_stapling_verify off;

        # Attach request ID to every response
        add_header X-Request-ID $request_id_final always;

        # CORS headers — applied to every response in this server block
        add_header Access-Control-Allow-Origin  $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID, X-CSRF-Token" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Max-Age "3600" always;

        # Preflight short-circuit
        if ($request_method = OPTIONS) {
            return 204;
        }

        # ── /health ────────────────────────────────────────────────────────────────
        location = /health {
            access_log off;
            add_header Content-Type application/json always;
            return 200 '{"status":"ok","service":"gateway"}';
        }

        # ── /v1/auth/ (identity service — no JWT required) ────────────────────────
        location /v1/auth/ {
            limit_req zone=auth_ip burst=10 nodelay;

            access_by_lua_block {
                require("rate_limit").check(5)
            }

            # Variable-based proxy_pass defers DNS resolution to request time.
            set $upstream_identity "identity-service:3001";
            proxy_pass http://$upstream_identity;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID      $request_id_final;
        }

        # ── /v1/bets (betting service — JWT required) ─────────────────────────────
        location /v1/bets {
            access_by_lua_block {
                require("rate_limit").check(60)
                require("auth").check()
            }

            # Mirror shadow traffic to staging (will 502 until staging exists — expected)
            mirror /mirror/v1/bets;
            mirror_request_body on;

            set $upstream_betting "betting-service:3002";
            proxy_pass http://$upstream_betting;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID      $request_id_final;
            proxy_set_header X-User-ID         $http_x_user_id;
            proxy_set_header X-User-Tier       $http_x_user_tier;
        }

        # ── /v1/wallet (identity service placeholder — wallet-service:3005 in Phase 2) ──
        location /v1/wallet {
            access_by_lua_block {
                require("rate_limit").check(60)
                require("auth").check()
            }

            set $upstream_identity "identity-service:3001";
            proxy_pass http://$upstream_identity;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID      $request_id_final;
            proxy_set_header X-User-ID         $http_x_user_id;
            proxy_set_header X-User-Tier       $http_x_user_tier;
        }

        # ── /v1/events and /v1/markets (market service — no auth required) ────────
        location ~ ^/v1/(events|markets) {
            access_by_lua_block {
                require("rate_limit").check(120)
            }

            set $upstream_market "market-service:3003";
            proxy_pass http://$upstream_market;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID      $request_id_final;
        }

        # ── /socket.io/ (realtime service — WebSocket) ────────────────────────────
        # No rate limiting — WebSocket connections are long-lived; rate limiting
        # at the connection level would wrongly throttle established sockets.
        location /socket.io/ {
            set $upstream_realtime "realtime-service:3004";
            proxy_pass http://$upstream_realtime;

            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID      $request_id_final;

            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── /internal/token/verify (internal subrequest — not externally routable) ─
        location = /internal/token/verify {
            internal;  # blocks external access — only accessible via ngx.location.capture

            set $upstream_identity "identity-service:3001";
            proxy_pass http://$upstream_identity/internal/auth/verify;

            proxy_pass_request_body off;
            proxy_set_header Content-Length   "";
            proxy_set_header Host             $host;
            proxy_set_header X-Original-URI   $request_uri;
            proxy_set_header Authorization    $http_authorization;
            proxy_set_header X-Request-ID     $request_id_final;
        }

        # ── /mirror/v1/bets (shadow traffic — internal) ───────────────────────────
        location /mirror/v1/bets {
            internal;  # only reachable from mirror directive above

            set $upstream_betting_staging "betting-service-staging:3002";
            proxy_pass http://$upstream_betting_staging/v1/bets;

            proxy_set_header Host             $host;
            proxy_set_header X-Real-IP        $remote_addr;
            proxy_set_header X-Shadow-Traffic "true";
            proxy_set_header X-Request-ID     $request_id_final;
        }

        # ── Error pages ───────────────────────────────────────────────────────────
        error_page 429 = @error_429;
        error_page 502 503 504 = @error_5xx;

        location @error_429 {
            add_header Retry-After    "60" always;
            add_header Content-Type   "application/json" always;
            add_header X-Request-ID   $request_id_final always;
            return 429 '{"error":"too_many_requests","message":"Rate limit exceeded. Try again in 60 seconds.","retry_after":60}';
        }

        location @error_5xx {
            add_header Content-Type "application/json" always;
            add_header X-Request-ID $request_id_final always;
            return 502 '{"error":"upstream_unavailable","message":"The service is temporarily unavailable. Please try again shortly."}';
        }
    }
}
